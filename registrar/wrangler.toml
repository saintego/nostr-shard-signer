name = "nostr-shard-registrar"
main = "registrar-worker.js"
compatibility_date = "2024-01-01"

# ── KV Namespaces ───────────────────────────────────────────────────────────────
# Create with:
#   wrangler kv:namespace create "REGISTRY"
#   wrangler kv:namespace create "CHALLENGES"
# Then paste the returned ids below.
[[kv_namespaces]]
binding = "REGISTRY_KV"
id      = "fc52bf20206a4aa4beb5d12a913c84c2"

[[kv_namespaces]]
binding = "CHALLENGES_KV"
id      = "c18dbae47fb04780ae6848013e804979"

# ── Environment variables ───────────────────────────────────────────────────────
# Set secrets with: wrangler secret put ROOT_PRIVATE_KEY_HEX
# Never commit the actual private key to source control.
[vars]
RELAY_URLS = "wss://relay.damus.io,wss://relay.nostr.band,wss://nos.lol"
