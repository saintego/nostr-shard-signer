<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    Content-Security-Policy: tighten in production.
    current policy is permissive to accommodate Web3Auth SDK and relay WebSockets.
    In production, replace 'self' sources and enumerate exact CDN origins.
  -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://auth.web3auth.io;
             connect-src 'self' wss: https:;
             img-src 'self' data: https:;
             style-src 'self' 'unsafe-inline';
             frame-ancestors *;" />
  <title>Nostr Signer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
      background: transparent;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    /* ── View system ── */
    .view { display: none; width: 100%; min-height: 100%; }
    .view.active { display: flex; flex-direction: column; align-items: center; }

    /* ── Login Button View ── */
    #view-button {
      padding: 6px;
      gap: 8px;
      justify-content: center;
    }

    .login-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: #7c3aed;
      color: #fff;
      width: 100%;
      justify-content: center;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .login-btn:hover { background: #6d28d9; }
    .login-btn:active { background: #5b21b6; }
    .login-btn img { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; }

    /* Large social grid */
    .social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
    }
    .social-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .social-btn:hover { background: #f3f4f6; }
    .social-btn img { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Avatar View ── */
    #view-avatar {
      width: 48px;
      height: 48px;
      cursor: pointer;
      justify-content: center;
    }
    #avatar-img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #7c3aed;
      object-fit: cover;
    }

    /* ── Profile Modal View ── */
    #view-modal {
      position: fixed;
      inset: 0;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      overflow-y: auto;
      gap: 14px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .modal-header h2 { font-size: 17px; font-weight: 700; color: #111827; }
    .close-btn {
      background: none;
      border: none;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      color: #6b7280;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .close-btn:hover { background: #f3f4f6; }

    /* ── Modal identity row (avatar thumbnail + name + npub) ── */
    .modal-identity-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 6px 0 10px;
      border-bottom: 1px solid #f3f4f6;
      margin-bottom: 4px;
    }
    .modal-identity-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #7c3aed;
      flex-shrink: 0;
    }
    .modal-identity-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }
    .modal-identity-info strong {
      font-size: 14px;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .modal-identity-info small {
      font-size: 10px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #7c3aed;
    }

    .field-group { width: 100%; display: flex; flex-direction: column; gap: 4px; }
    .field-group label {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field-group input,
    .field-group textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      resize: vertical;
    }
    .field-group input:focus,
    .field-group textarea:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px #ede9fe; }

    .key-row {
      display: flex;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .key-row code {
      flex: 1;
      font-size: 11px;
      padding: 6px 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: all;
      cursor: pointer;
      font-family: "SFMono-Regular", Consolas, monospace;
    }
    .nsec-input {
      flex: 1;
      font-size: 11px;
      padding: 6px 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-family: "SFMono-Regular", Consolas, monospace;
      outline: none;
      color: #374151;
      min-width: 0;
    }
    .nsec-input:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px #ede9fe; }
    .copy-btn {
      padding: 6px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: #f3f4f6; }

    .action-btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }

    .status-msg {
      font-size: 12px;
      color: #6b7280;
      width: 100%;
      text-align: center;
      min-height: 16px;
    }
    .status-msg.success { color: #059669; }
    .status-msg.error   { color: #dc2626; }

    /* ── Confirmation View ── */
    #view-confirm {
      position: fixed;
      inset: 0;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      gap: 14px;
      justify-content: center;
    }
    #view-confirm h3 { font-size: 15px; font-weight: 700; color: #111827; width: 100%; }
    #confirm-detail {
      font-size: 11px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      width: 100%;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #374151;
      font-family: "SFMono-Regular", Consolas, monospace;
    }
    .confirm-actions { display: flex; gap: 10px; width: 100%; }
    .confirm-actions button { flex: 1; }

    /* ── Error Banner ── */
    #error-banner {
      display: none;
      position: fixed;
      inset: 0;
      background: #fff;
      border-radius: 16px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      padding: 24px;
      text-align: center;
    }
    #error-banner.active { display: flex; }
    #error-banner .err-icon { font-size: 32px; }
    #error-banner p { font-size: 14px; color: #dc2626; font-weight: 700; }
    #error-banner small { font-size: 12px; color: #6b7280; line-height: 1.5; }

    /* ── Loading spinner ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      border-radius: 16px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay.hidden { display: none; }
  </style>
</head>
<body>

<!-- ── Loading overlay (shown during bootstrap) ── -->
<div id="loading-overlay"><div class="spinner"></div></div>

<!-- ── Login Button View ── -->
<div id="view-button" class="view">
  <div id="login-standard" style="width:100%;display:flex;flex-direction:column;gap:8px;"></div>
  <div id="login-grid" class="social-grid" style="display:none;"></div>
</div>

<!-- ── Avatar View ── -->
<div id="view-avatar" class="view" role="button" tabindex="0" aria-label="Open Nostr profile">
  <img id="avatar-img" src="" alt="Profile avatar" />
</div>

<!-- ── Profile Modal View ── -->
<div id="view-modal" class="view">
  <div class="modal-header">
    <h2>Nostr Profile</h2>
    <button class="close-btn" id="btn-close-modal" aria-label="Close">✕</button>
  </div>

  <!-- Identity row: avatar thumbnail + display name + truncated npub -->
  <div class="modal-identity-row">
    <img id="modal-identity-img" class="modal-identity-avatar" src="" alt="" />
    <div class="modal-identity-info">
      <strong id="modal-display-name"></strong>
      <small id="modal-npub-display"></small>
    </div>
  </div>

  <img class="profile-avatar" id="modal-avatar-img" src="" alt="" />

  <div class="field-group">
    <label>Display Name</label>
    <input type="text" id="field-name" placeholder="Satoshi" autocomplete="off" />
  </div>
  <div class="field-group">
    <label>Avatar URL</label>
    <input type="url" id="field-picture" placeholder="https://..." autocomplete="off" />
  </div>
  <div class="field-group">
    <label>About</label>
    <textarea id="field-about" rows="3" placeholder="Bio..."></textarea>
  </div>
  <div class="field-group">
    <label>Lightning / LNURL</label>
    <input type="text" id="field-lud16" placeholder="you@walletofsatoshi.com" autocomplete="off" />
  </div>

  <div class="field-group">
    <label>Public Key (npub)</label>
    <div class="key-row">
      <code id="display-npub" title="Click to select all"></code>
      <button class="copy-btn" id="btn-copy-npub">Copy</button>
    </div>
  </div>

  <div class="field-group">
    <label>Secret Key (nsec) — keep private!</label>
    <div class="key-row">
      <input id="nsec-input" type="password" readonly autocomplete="off"
             class="nsec-input" aria-label="Secret key nsec" />
      <button class="copy-btn" id="nsec-toggle-btn">Show</button>
      <button class="copy-btn" id="btn-copy-nsec">Copy</button>
    </div>
  </div>

  <button class="action-btn btn-primary" id="btn-save-profile">Save Profile</button>
  <p class="status-msg" id="save-status"></p>
  <button class="action-btn btn-danger" id="btn-logout">Log Out</button>
</div>

<!-- ── Confirmation View ── -->
<div id="view-confirm" class="view">
  <h3 id="confirm-title">Approve Request?</h3>
  <pre id="confirm-detail"></pre>
  <div class="confirm-actions">
    <button class="action-btn btn-secondary" id="btn-reject">Reject</button>
    <button class="action-btn btn-primary"   id="btn-approve">Approve</button>
  </div>
</div>

<!-- ── Error Banner ── -->
<div id="error-banner">
  <span class="err-icon">⚠️</span>
  <p id="error-msg">An error occurred.</p>
  <small id="error-detail"></small>
</div>

<!--
  PRODUCTION NOTE:
  Pin these CDN scripts with Subresource Integrity (SRI) hashes.
  Generate with: https://www.srihash.org/
  Example: integrity="sha384-<hash>" crossorigin="anonymous"
-->
<script type="module">
import {
  SimplePool,
  finalizeEvent,
  getPublicKey,
  nip04,
  nip44,
  nip19,
} from "https://cdn.jsdelivr.net/npm/nostr-tools@2/+esm";

// Minimal hex ↔ bytes helpers (nostr-tools v2 re-exports may vary by CDN build)
function hexToBytes(hex) {
  const arr = new Uint8Array(hex.length / 2);
  for (let i = 0; i < arr.length; i++) arr[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
  return arr;
}
function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
}

(async function () {
  "use strict";

  // ─────────────────────────────────────────────────────────────────────────────
  // DEPLOY-TIME CONSTANTS — fill these in before hosting
  // ─────────────────────────────────────────────────────────────────────────────

  /** Hex public key of the server keypair that signs NIP-33 registry events */
  const ROOT_PUBKEY_HEX = "__ROOT_PUBKEY_HEX__";

  /** Relays to query for the NIP-33 registry */
  const REGISTRY_RELAYS = ["wss://relay.damus.io", "wss://relay.nostr.band"];

  /** Relays to publish signed profile updates to */
  const PUBLISH_RELAYS  = [
    "wss://relay.damus.io",
    "wss://relay.nostr.band",
    "wss://nos.lol",
  ];

  const DEFAULT_AVATAR = "https://robohash.org/nostr?set=set4&size=48x48";

  // ─────────────────────────────────────────────────────────────────────────────
  // URL params (set by nostr-bridge.js when it builds the iframe src)
  // ─────────────────────────────────────────────────────────────────────────────
  const urlParams  = new URLSearchParams(location.search);
  const clientId   = urlParams.get("clientId")   || "";
  const layout     = urlParams.get("layout")     || "floating";
  const buttonSize = urlParams.get("buttonSize") || "standard";

  // ─────────────────────────────────────────────────────────────────────────────
  // Secure parent-origin derivation
  // ancestorOrigins is the authoritative source — it cannot be spoofed via URL params.
  // ─────────────────────────────────────────────────────────────────────────────
  let _parentOrigin = "";
  try {
    if (
      typeof document.location.ancestorOrigins !== "undefined" &&
      document.location.ancestorOrigins.length > 0
    ) {
      const ancestor = document.location.ancestorOrigins[0];
      if (ancestor && ancestor !== "null") {
        _parentOrigin = new URL(ancestor).origin;
      }
    }
  } catch (_) {}
  // Fallback for browsers without ancestorOrigins (e.g. Firefox in some contexts)
  if (!_parentOrigin && document.referrer) {
    try { _parentOrigin = new URL(document.referrer).origin; } catch (_) {}
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────────────────────────────────────
  let privateKeyBytes  = null; // Uint8Array — NEVER sent via postMessage
  let publicKeyHex     = null;
  let nsecStr          = null;
  let npubStr          = null;
  let web3auth         = null;
  let userProfile      = {};

  /** Pending confirmation: { approve: Function, reject: Function } */
  let pendingConfirmation = null;

  // ─────────────────────────────────────────────────────────────────────────────
  // DOM refs
  // ─────────────────────────────────────────────────────────────────────────────
  const loadingOverlay  = document.getElementById("loading-overlay");
  const errorBanner     = document.getElementById("error-banner");
  const errorMsgEl      = document.getElementById("error-msg");
  const errorDetailEl   = document.getElementById("error-detail");
  const viewEls         = {
    button:  document.getElementById("view-button"),
    avatar:  document.getElementById("view-avatar"),
    modal:   document.getElementById("view-modal"),
    confirm: document.getElementById("view-confirm"),
  };

  // ─────────────────────────────────────────────────────────────────────────────
  // Helpers
  // ─────────────────────────────────────────────────────────────────────────────
  function hideLoading() {
    loadingOverlay.classList.add("hidden");
  }

  function showError(msg, detail) {
    hideLoading();
    errorMsgEl.textContent    = msg    || "An unexpected error occurred.";
    errorDetailEl.textContent = detail || "";
    errorBanner.classList.add("active");
    Object.values(viewEls).forEach(function (v) { v.classList.remove("active"); });
  }

  function showView(name) {
    Object.values(viewEls).forEach(function (v) { v.classList.remove("active"); });
    if (viewEls[name]) viewEls[name].classList.add("active");
    // Map view name → RESIZE state expected by the parent
    var resizeState = name === "button"  ? "button"
                    : name === "avatar"  ? "avatar"
                    : "modal"; // modal and confirm both use modal dimensions
    postToParent({ type: "RESIZE", state: resizeState });
  }

  // Safely post to parent — uses the securely-derived _parentOrigin
  function postToParent(msg) {
    if (!_parentOrigin || _parentOrigin === "null") return;
    try {
      window.parent.postMessage(msg, _parentOrigin);
    } catch (_) { /* cross-origin write blocked — ignore */ }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // Ancestor origin validation
  // Verifies this page is actually embedded in an iframe (not opened standalone).
  // The _parentOrigin is derived from ancestorOrigins above, so it is already
  // authoritative — we just confirm we are inside an iframe here.
  // ─────────────────────────────────────────────────────────────────────────────
  function validateAncestorOrigin() {
    // Must be in an iframe to have a parent origin
    if (!_parentOrigin) return false;

    if (typeof document.location.ancestorOrigins !== "undefined") {
      const ancestors = document.location.ancestorOrigins;
      if (ancestors.length === 0) return false; // standalone — not in an iframe
      if (ancestors[0] === "null") return false; // sandboxed without allow-same-origin
    }
    return true;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // NIP-33 Registry check (sessionStorage cache + SimplePool)
  // Queries ROOT_PUBKEY's kind:30078 events with d-tag == clientId
  // and checks that _parentOrigin is in the allowed_domains list.
  // ─────────────────────────────────────────────────────────────────────────────

  async function isAuthorized(cId, origin) {
    const cacheKey = "__nbr_" + cId;
    const cached   = sessionStorage.getItem(cacheKey);
    if (cached) {
      try { return checkDomain(JSON.parse(cached), origin); } catch (_) {}
    }

    const pool   = new SimplePool();
    let content  = null;
    try {
      const events = await pool.querySync(
        REGISTRY_RELAYS,
        { authors: [ROOT_PUBKEY_HEX], kinds: [30078], "#d": [cId], limit: 1 },
        { maxWait: 8000 },
      );
      if (events.length > 0 && events[0].pubkey === ROOT_PUBKEY_HEX) {
        content = JSON.parse(events[0].content);
      }
    } catch (_) {
    } finally {
      pool.close(REGISTRY_RELAYS);
    }

    if (!content) return false;
    sessionStorage.setItem(cacheKey, JSON.stringify(content));
    return checkDomain(content, origin);
  }

  function checkDomain(content, origin) {
    const allowed = content.allowed_domains;
    if (!Array.isArray(allowed)) return false;
    const norm = (d) => {
      try { return new URL(d.startsWith("http") ? d : "https://" + d).origin.toLowerCase(); }
      catch (_) { return d.toLowerCase(); }
    };
    const target = norm(origin);
    return allowed.some((d) => norm(d) === target);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // Web3Auth initialization (lazy-loaded @web3auth/modal@9)
  // ─────────────────────────────────────────────────────────────────────────────
  async function initWeb3Auth() {
    // Lazy-import: only loaded after the registry check passes to save bandwidth
    const { Web3Auth } = await import("https://cdn.jsdelivr.net/npm/@web3auth/modal@9/+esm");

    const instance = new Web3Auth({
      clientId:        clientId,
      chainConfig:     { chainNamespace: "other" },
      web3AuthNetwork: "sapphire_mainnet",
      uiConfig: {
        loginMethodsOrder: ["google", "apple", "twitter", "email_passwordless"],
      },
    });
    await instance.initModal();
    return instance;
  }

  async function loginWith(provider) {
    await web3auth.connectTo("openlogin", { loginProvider: provider });
    await extractAndStoreKey();
  }

  async function extractAndStoreKey() {
    if (!web3auth || !web3auth.provider) throw new Error("No provider after login");

    const rawKey = await web3auth.provider.request({ method: "private_key" });
    if (!rawKey || typeof rawKey !== "string") throw new Error("Empty private key");
    if (!/^[0-9a-f]{64}$/i.test(rawKey)) throw new Error("Invalid private key format");

    // Store as bytes — avoids keeping a hex string in memory longer than necessary
    privateKeyBytes = hexToBytes(rawKey.toLowerCase());
    publicKeyHex    = getPublicKey(privateKeyBytes);
    nsecStr         = nip19.nsecEncode(privateKeyBytes);
    npubStr         = nip19.npubEncode(publicKeyHex);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // Auto-approve policy
  //   Approved automatically: Kind 1 (notes), Kind 7 (reactions), nip44_encrypt
  //   Requires confirmation: everything else, including nip04_encrypt (DM consent)
  // ─────────────────────────────────────────────────────────────────────────────
  const AUTO_APPROVE_KINDS = new Set([1, 7]);

  function requiresConfirmation(method, params) {
    if (method === "nip04_decrypt" || method === "nip44_decrypt") return true;
    if (method === "nip04_encrypt") return true;  // DM encryption warrants explicit consent
    if (method === "sign_event") {
      try {
        const evt = JSON.parse(params[0]);
        return !AUTO_APPROVE_KINDS.has(evt.kind);
      } catch (_) { return true; }
    }
    // nip44_encrypt: auto-approve (plaintext already known to the parent)
    if (method === "nip44_encrypt") return false;
    return true; // unknown method — prompt
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // Cryptographic operations (all operate on the in-memory privateKeyBytes)
  // ─────────────────────────────────────────────────────────────────────────────
  async function processRpc(method, params) {
    if (method === "get_public_key") {
      return publicKeyHex;
    }

    if (method === "sign_event") {
      const unsignedEvent = JSON.parse(params[0]);
      const signedEvent   = finalizeEvent(unsignedEvent, privateKeyBytes);
      return JSON.stringify(signedEvent);
    }

    if (method === "nip04_encrypt") {
      return await nip04.encrypt(bytesToHex(privateKeyBytes), params[0], params[1]);
    }

    if (method === "nip04_decrypt") {
      return await nip04.decrypt(bytesToHex(privateKeyBytes), params[0], params[1]);
    }

    if (method === "nip44_encrypt") {
      const ck = nip44.v2.utils.getConversationKey(privateKeyBytes, params[0]);
      return nip44.v2.encrypt(params[1], ck);
    }

    if (method === "nip44_decrypt") {
      const ck = nip44.v2.utils.getConversationKey(privateKeyBytes, params[0]);
      return nip44.v2.decrypt(params[1], ck);
    }

    throw new Error("Unknown method: " + method);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // Confirmation UI
  // ─────────────────────────────────────────────────────────────────────────────
  const CONFIRM_TITLES = {
    nip04_encrypt:  "Allow app to encrypt a direct message?",
    nip04_decrypt:  "Allow app to decrypt a direct message?",
    nip44_encrypt:  "Allow app to encrypt a sealed message?",
    nip44_decrypt:  "Allow app to decrypt a sealed message?",
    sign_event:     "Approve event signature?",
  };

  function presentConfirmation(method, params) {
    return new Promise(function (approve, reject) {
      pendingConfirmation = { approve: approve, reject: reject };

      document.getElementById("confirm-title").textContent =
        CONFIRM_TITLES[method] || "Approve request?";

      var detail;
      try {
        if (method === "sign_event") {
          detail = JSON.stringify(JSON.parse(params[0]), null, 2);
        } else {
          detail = "Method: " + method + "\n\nParams:\n" + JSON.stringify(params, null, 2);
        }
      } catch (_) { detail = "Method: " + method; }

      document.getElementById("confirm-detail").textContent = detail;
      showView("confirm");
    });
  }

  document.getElementById("btn-approve").addEventListener("click", function () {
    if (pendingConfirmation) {
      var cb = pendingConfirmation.approve;
      pendingConfirmation = null;
      showView("avatar");
      cb();
    }
  });

  document.getElementById("btn-reject").addEventListener("click", function () {
    if (pendingConfirmation) {
      var cb = pendingConfirmation.reject;
      pendingConfirmation = null;
      showView("avatar");
      cb(new Error("User rejected request"));
    }
  });

  // ─────────────────────────────────────────────────────────────────────────────
  // Incoming postMessage handler (Parent → Iframe, NIP-46 RPC)
  // ─────────────────────────────────────────────────────────────────────────────
  window.addEventListener("message", async function (event) {
    // 1. Reject null origins unconditionally
    if (!event.origin || event.origin === "null") return;

    // 2. Only accept messages from the authoritative parent origin
    if (event.origin !== _parentOrigin) return;

    // 3. Only accept from window.parent (not from nested frames or popups)
    if (event.source !== window.parent) return;

    var data = event.data;
    if (!data || typeof data !== "object") return;

    var id     = data.id;
    var method = data.method;
    var params = Array.isArray(data.params) ? data.params : [];

    // Must look like a NIP-46 RPC call
    if (id === undefined || !method) return;

    // Must be authenticated to process any crypto request
    if (!privateKeyBytes) {
      postToParent({ id: id, result: null, error: "Not authenticated" });
      return;
    }

    try {
      var result;
      if (requiresConfirmation(method, params)) {
        await presentConfirmation(method, params);
        result = await processRpc(method, params);
      } else {
        result = await processRpc(method, params);
      }
      postToParent({ id: id, result: result, error: null });
    } catch (err) {
      postToParent({ id: id, result: null, error: (err && err.message) || "Operation failed" });
    }
  });

  // ─────────────────────────────────────────────────────────────────────────────
  // Profile UI helpers
  // ─────────────────────────────────────────────────────────────────────────────
  function refreshAvatarUI() {
    const pic = userProfile.picture || DEFAULT_AVATAR;
    document.getElementById("avatar-img").src           = pic;
    document.getElementById("modal-avatar-img").src     = pic;
    document.getElementById("modal-identity-img").src   = pic;
    document.getElementById("modal-display-name").textContent = userProfile.name || npubStr || "";
    document.getElementById("modal-npub-display").textContent = npubStr || "";
    document.getElementById("display-npub").textContent = npubStr || "";
  }

  // Avatar click/keyboard → open modal
  function openModal() {
    document.getElementById("field-name").value    = userProfile.name    || "";
    document.getElementById("field-picture").value = userProfile.picture || "";
    document.getElementById("field-about").value   = userProfile.about   || "";
    document.getElementById("field-lud16").value   = userProfile.lud16   || "";
    // Populate nsec password input and reset toggle
    const nsecInput  = document.getElementById("nsec-input");
    const nsecToggle = document.getElementById("nsec-toggle-btn");
    nsecInput.value     = nsecStr || "";
    nsecInput.type      = "password";
    nsecToggle.textContent = "Show";
    document.getElementById("save-status").textContent = "";
    document.getElementById("save-status").className   = "status-msg";
    showView("modal");
  }

  document.getElementById("view-avatar").addEventListener("click", openModal);

  // Keyboard accessibility for avatar (Enter / Space)
  document.getElementById("view-avatar").addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openModal(); }
  });

  document.getElementById("btn-close-modal").addEventListener("click", function () {
    showView("avatar");
  });

  // Copy npub
  document.getElementById("btn-copy-npub").addEventListener("click", function () {
    var btn = document.getElementById("btn-copy-npub");
    navigator.clipboard.writeText(npubStr || "").then(function () {
      btn.textContent = "Copied!";
      setTimeout(function () { btn.textContent = "Copy"; }, 2000);
    }).catch(function () {});
  });

  // nsec toggle: Show / Hide
  document.getElementById("nsec-toggle-btn").addEventListener("click", function () {
    const input = document.getElementById("nsec-input");
    const btn   = document.getElementById("nsec-toggle-btn");
    if (input.type === "password") {
      input.type      = "text";
      btn.textContent = "Hide";
      // Auto-re-hide after 10 s for safety
      setTimeout(function () {
        if (input.type === "text") { input.type = "password"; btn.textContent = "Show"; }
      }, 10000);
    } else {
      input.type      = "password";
      btn.textContent = "Show";
    }
  });

  // nsec copy
  document.getElementById("btn-copy-nsec").addEventListener("click", function () {
    const btn = document.getElementById("btn-copy-nsec");
    navigator.clipboard.writeText(nsecStr || "").then(function () {
      btn.textContent = "Copied!";
      setTimeout(function () { btn.textContent = "Copy"; }, 2000);
    }).catch(function () {});
  });

  // Save profile
  document.getElementById("btn-save-profile").addEventListener("click", async function () {
    const btn = document.getElementById("btn-save-profile");
    btn.disabled    = true;
    btn.textContent = "Saving…";

    userProfile.name    = document.getElementById("field-name").value.trim();
    userProfile.picture = document.getElementById("field-picture").value.trim();
    userProfile.about   = document.getElementById("field-about").value.trim();
    userProfile.lud16   = document.getElementById("field-lud16").value.trim();

    const statusEl = document.getElementById("save-status");
    statusEl.textContent = "";
    statusEl.className   = "status-msg";

    const metadataEvent = finalizeEvent({
      kind:       0,
      created_at: Math.floor(Date.now() / 1000),
      tags:       [],
      content:    JSON.stringify(userProfile),
    }, privateKeyBytes);

    try {
      await Promise.any(PUBLISH_RELAYS.map(function (r) { return publishToRelay(r, metadataEvent); }));
      statusEl.textContent = "Profile saved!";
      statusEl.className   = "status-msg success";
      refreshAvatarUI();
      btn.disabled    = false;
      btn.textContent = "Saved!";
      setTimeout(function () { btn.textContent = "Save Profile"; }, 2000);
    } catch (_) {
      statusEl.textContent = "Failed to publish. Check your connection.";
      statusEl.className   = "status-msg error";
      btn.disabled    = false;
      btn.textContent = "Save Profile";
    }
    setTimeout(function () {
      statusEl.textContent = "";
      statusEl.className   = "status-msg";
    }, 4000);
  });

  // Fetch NIP-01 profile metadata via SimplePool (best-effort)
  async function fetchProfile(pubkeyHex) {
    const pool = new SimplePool();
    let events = [];
    try {
      events = await pool.querySync(
        PUBLISH_RELAYS,
        { authors: [pubkeyHex], kinds: [0], limit: 1 },
        { maxWait: 5000 },
      );
    } catch (_) {
    } finally {
      pool.close(PUBLISH_RELAYS);
    }
    if (!events.length) return null;
    try { return JSON.parse(events[0].content); } catch (_) { return null; }
  }

  // ── Social login button system ────────────────────────────────────────────────
  const SOCIAL_PROVIDERS = [
    {
      id: "google",
      label: "Sign in with Google",
      gridLabel: "Google",
      iconHtml: `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" style="width:20px;height:20px;flex-shrink:0" />`,
    },
    {
      id: "apple",
      label: "Sign in with Apple",
      gridLabel: "Apple",
      iconHtml: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 1000" style="width:18px;height:18px;flex-shrink:0"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-43.4-150.3-109.2c-52-77.1-95.1-198.4-95.1-313.6 0-197.8 129.1-302.2 256.1-302.2 66 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2z"/></svg>`,
    },
    {
      id: "twitter",
      label: "Sign in with Twitter/X",
      gridLabel: "Twitter/X",
      iconHtml: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:18px;height:18px;flex-shrink:0"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.63L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
    },
    {
      id: "email_passwordless",
      label: "Sign in with Email",
      gridLabel: "Email",
      iconHtml: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:18px;height:18px;flex-shrink:0"><path fill="#6b7280" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>`,
    },
  ];

  function makeSocialBtn(provider, className, label) {
    const btn     = document.createElement("button");
    btn.className = className;
    btn.dataset.provider = provider.id;
    btn.innerHTML = provider.iconHtml + " " + label;
    btn.addEventListener("click", function () { handleLogin(provider.id); });
    return btn;
  }

  function renderSocialButtons(bSize) {
    const standardEl = document.getElementById("login-standard");
    const gridEl     = document.getElementById("login-grid");
    standardEl.innerHTML = "";
    gridEl.innerHTML     = "";

    if (bSize === "large_social_grid") {
      standardEl.style.display = "none";
      gridEl.style.display     = "grid";
      for (const p of SOCIAL_PROVIDERS) {
        gridEl.appendChild(makeSocialBtn(p, "social-btn", p.gridLabel));
      }
    } else {
      // Standard: Google + Email only (most common flows)
      standardEl.style.display = "flex";
      gridEl.style.display     = "none";
      const subset = SOCIAL_PROVIDERS.filter(p => p.id === "google" || p.id === "email_passwordless");
      for (const p of subset) {
        standardEl.appendChild(makeSocialBtn(p, "login-btn", p.label));
      }
    }
  }

  // ── Relay publish helper (single relay) ──────────────────────────────────────
  function publishToRelay(relayUrl, event) {
    return new Promise(function (resolve, reject) {
      let ws;
      const timer = setTimeout(function () { if (ws) ws.close(); reject(new Error("Timeout")); }, 8000);
      try { ws = new WebSocket(relayUrl); } catch (e) { reject(e); return; }
      ws.onopen    = function () { ws.send(JSON.stringify(["EVENT", event])); };
      ws.onmessage = function (e) {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        if (Array.isArray(msg) && msg[0] === "OK") {
          clearTimeout(timer); ws.close();
          msg[2] !== false ? resolve() : reject(new Error(msg[3] || "Rejected"));
        }
      };
      ws.onerror = function () { clearTimeout(timer); reject(new Error("WebSocket error")); };
    });
  }

  // ── Login / Logout ────────────────────────────────────────────────────────────
  async function handleLogin(provider) {
    try {
      await loginWith(provider);
      userProfile = await fetchProfile(publicKeyHex) || {};
      refreshAvatarUI();
      showView("avatar");
      postToParent({ type: "AUTH_SUCCESS", pubkey: publicKeyHex });
    } catch (err) {
      console.error("Login failed:", err);
      const statusEl = document.getElementById("save-status");
      if (statusEl) { statusEl.textContent = "Login failed: " + (err.message || err); }
    }
  }

  document.getElementById("btn-logout").addEventListener("click", async function () {
    try { if (web3auth) await web3auth.logout(); } catch (_) {}
    if (privateKeyBytes) privateKeyBytes.fill(0);
    privateKeyBytes = null; publicKeyHex = null; nsecStr = null; npubStr = null;
    userProfile = {};
    showView("button");
    renderSocialButtons(buttonSize);
    postToParent({ type: "AUTH_STATE", loggedIn: false, pubkey: null });
  });

  // ─────────────────────────────────────────────────────────────────────────────
  // Bootstrap
  // ─────────────────────────────────────────────────────────────────────────────
  async function bootstrap() {
    // 1. Validate we're embedded in the expected parent
    if (!validateAncestorOrigin()) {
      showError(
        "Invalid embedding context.",
        "This signer must be embedded via an authorized nostr-bridge.js integration."
      );
      return;
    }

    // 2. Require a clientId
    if (!clientId) {
      showError("Missing clientId.", "No Web3Auth clientId was provided in the iframe URL.");
      return;
    }

    // 3. Render social buttons for the configured layout
    renderSocialButtons(buttonSize);

    // 4. Validate domain against NIP-33 registry (uses _parentOrigin, not URL param)
    const authorized = await isAuthorized(clientId, _parentOrigin);
    if (!authorized) {
      showError(
        "Domain not authorized for this Client ID.",
        _parentOrigin + " is not registered for clientId: " + clientId
      );
      return;
    }

    // 5. Initialize Web3Auth (lazy-loaded)
    try {
      web3auth = await initWeb3Auth();
    } catch (err) {
      showError("Failed to initialize authentication provider.", err.message);
      return;
    }

    // 6. Check for an existing session
    if (web3auth.connected) {
      try {
        await extractAndStoreKey();
        userProfile = await fetchProfile(publicKeyHex) || {};
        refreshAvatarUI();
        hideLoading();
        showView("avatar");
        postToParent({ type: "AUTH_STATE", loggedIn: true, pubkey: publicKeyHex });
        return;
      } catch (_) { /* fall through to login screen */ }
    }

    // 7. No active session — show login button
    hideLoading();
    showView("button");
    postToParent({ type: "AUTH_STATE", loggedIn: false, pubkey: null });
  }

  bootstrap().catch(function (err) {
    showError("Unexpected initialization error.", err && err.message);
  });

}());
</script>
